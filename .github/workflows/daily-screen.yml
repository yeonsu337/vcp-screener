name: Daily VCP Screen

on:
  schedule:
    # Runs at 23:00 UTC Mon-Fri (= ~19:00 EST, after US market close)
    - cron: "0 23 * * 1-5"
  workflow_dispatch: {}  # manual trigger

permissions:
  contents: write  # needed to commit updated data back

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run daily screener
        run: python scripts/run_daily.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): daily VCP scan $(date -u +%Y-%m-%d)"
            git push
          fi
